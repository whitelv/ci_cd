<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniDone</title>
  </head>
  <body>
    <main class="app">
      <section class="todo-card">
        <h1>UniDone</h1>
        <p class="app-status" id="app-status"></p>
        <form class="todo-form" id="todo-form">
          <label class="sr-only" for="task-input">Enter a task</label>
          <input
            id="task-input"
            name="task"
            type="text"
            placeholder="Enter a task"
            autocomplete="off"
          />
          <button type="submit">Add Task</button>
        </form>
        <div class="filter-actions" id="filter-actions"></div>
        <button class="danger-button" id="break-world-button" type="button">
          Break the world
        </button>
        <ul class="todo-list" id="todo-list"></ul>
        <footer class="app-footer">
          <small>Environment status is loaded from Vite env files.</small>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
